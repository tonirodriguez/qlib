qlib_init:
    provider_uri: "~/.qlib/qlib_data/us_data"
    region: us

# NOTA: Definimos dos universos distintos.
market: &market sp500 # Todo el mercado para aprender
benchmark: &benchmark ^GSPC

data_handler_config: &data_handler_config
    # 1. Obtenemos datos de las tecnológicas
    start_time: 2018-01-01
    end_time: 2025-12-31
    fit_start_time: 2018-01-01
    fit_end_time: 2023-12-31
    instruments: *market # Extrae los features de TODO el mercado

port_analysis_config: &port_analysis_config
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal: <PRED>
            # TOPK 1: El modelo sólo comprará la mejor puntuada de las 3 cada día
            topk: 10
            n_drop: 2

    backtest:
        start_time: 2025-01-01
        end_time: 2026-03-29
        account: 100000
        benchmark: *benchmark
        exchange_kwargs:
            limit_threshold: 0.095
            deal_price: close
            open_cost: 0.0005
            close_cost: 0.0015
            min_cost: 5

task:
    model:
        class: LGBModel
        module_path: qlib.contrib.model.gbdt
        kwargs:
            loss: mse
            colsample_bytree: 0.8
            learning_rate: 0.05
            subsample: 0.8
            lambda_l1: 1.0
            lambda_l2: 1.0
            max_depth: 8
            num_leaves: 64
            num_threads: 8

    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: Alpha158
                module_path: qlib.contrib.data.handler
                kwargs: *data_handler_config
            segments:
                # 2. Entrenamos con TODO el mercado hasta 2021
                train: [2018-01-01, 2023-12-31]
                valid: [2024-01-01, 2024-12-31]
                # 3. Probamos desde 2024
                test: [2025-01-01, 2025-12-31]
    
    record: 
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs: 
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs: 
            ana_long_short: False
            ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs: 
            config: *port_analysis_config

experiment_name: backtest_analysis
top_n: 10
min_score: null
weight_mode: equal
max_weight: 0.10
min_price: 5.0
min_avg_dollar_volume: 1000000
max_turnover: 0.30
cash_buffer: 0.02
