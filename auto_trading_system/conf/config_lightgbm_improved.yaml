qlib_init:
    provider_uri: "~/.qlib/qlib_data/us_data"
    region: us

market: &market sp500
benchmark: &benchmark ^GSPC

data_handler_config: &data_handler_config
    start_time: 2018-01-01
    end_time: 2026-03-31
    fit_start_time: 2018-01-01
    fit_end_time: 2023-12-31
    instruments: *market
    infer_processors:
        - class: RobustZScoreNorm
          kwargs:
            fields_group: feature
            clip_outlier: true
        - class: Fillna
          kwargs:
            fields_group: feature
    learn_processors:
        - class: DropnaLabel
        - class: CSRankNorm
          kwargs:
            fields_group: label

port_analysis_config: &port_analysis_config
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal: <PRED>
            topk: 20
            n_drop: 5
    backtest:
        start_time: 2025-01-01
        end_time: 2026-03-31
        account: 100000
        benchmark: *benchmark
        exchange_kwargs:
            limit_threshold: 0.095
            deal_price: close
            open_cost: 0.0005
            close_cost: 0.0015
            min_cost: 5

task:
    model:
        class: LGBModel
        module_path: qlib.contrib.model.gbdt
        kwargs:
            loss: mse
            learning_rate: 0.03
            num_boost_round: 1200
            early_stopping_rounds: 100
            colsample_bytree: 0.7
            subsample: 0.7
            subsample_freq: 1
            lambda_l1: 10.0
            lambda_l2: 30.0
            max_depth: 6
            num_leaves: 31
            min_data_in_leaf: 200
            num_threads: 8

    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: Alpha158
                module_path: qlib.contrib.data.handler
                kwargs: *data_handler_config
            segments:
                train: [2018-01-01, 2023-12-31]
                valid: [2024-01-01, 2024-12-31]
                test: [2025-01-01, 2026-03-31]

    record:
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            ana_long_short: True
            ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            config: *port_analysis_config

experiment_name: config_analysis_improved
