qlib_init:
    provider_uri: "~/.qlib/qlib_data/us_data"
    region: us

# NOTA: Definimos dos universos distintos.
market: &market nasdaq100 # Todo el mercado para aprender
tech_market: &tech_market tech_giants_universe # Nuestro archivo para invertir
benchmark: &benchmark ^NDX

data_handler_config: &data_handler_config
    # 1. Obtenemos datos de las tecnológicas
    start_time: 2008-01-01
    end_time: 2026-03-18
    fit_start_time: 2008-01-01
    fit_end_time: 2026-03-18
    instruments: *market # Extrae los features de TODO el mercado
    infer_processors:
        - class: FilterCol
          kwargs: { fields_group: feature, col_list: ["RESI5", "WVMA5", "RSQR5", "KLEN", "ROC60", "VSTD5", "STD5"] }
        - class: RobustZScoreNorm
          kwargs: { fields_group: feature, clip_outlier: true }
        - class: Fillna
          kwargs: { fields_group: feature }
    learn_processors:
        - class: DropnaLabel
        - class: CSRankNorm
          kwargs: { fields_group: label }
    label: ["Ref($close, -2) / Ref($close, -1) - 1"] 

port_analysis_config: &port_analysis_config
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal: <PRED>
            # TOPK 1: El modelo sólo comprará la mejor puntuada de las 3 cada día
            topk: 1
            n_drop: 0
    backtest:
        start_time: 2024-01-01
        end_time: 2026-03-18
        account: 100000
        benchmark: *benchmark
        exchange_kwargs:
            limit_threshold: 0.095
            deal_price: close
            open_cost: 0.0005
            close_cost: 0.0015
            min_cost: 5

task:
    model:
        class: LGBModel
        module_path: qlib.contrib.model.gbdt
        kwargs:
            loss: mse
            colsample_bytree: 0.8879
            learning_rate: 0.0421
            subsample: 0.8789
            lambda_l1: 205.6999
            lambda_l2: 580.9768
            max_depth: 8
            num_leaves: 210
            num_threads: 20
    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: Alpha158
                module_path: qlib.contrib.data.handler
                kwargs: *data_handler_config
            segments:
                # 2. Entrenamos con TODO el mercado hasta 2021
                train: [2008-01-01, 2021-12-31]
                valid: [2022-01-01, 2023-12-31]
                # 3. Probamos desde 2024
                test: [2024-01-01, null]
    record: 
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs: 
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs: 
            ana_long_short: False
            ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs: 
            config: *port_analysis_config
